name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    name: test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: toolkit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: toolkit/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Verify committed dist/okf.mjs is in sync with source
        run: |
          if ! git diff --exit-code dist/okf.mjs; then
            echo "::error::dist/okf.mjs is out of sync. Run 'npm run build' in toolkit/ and commit the result."
            exit 1
          fi
