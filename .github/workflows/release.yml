name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: build + publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: toolkit/package-lock.json

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./toolkit/package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match toolkit/package.json version $PKG. Bump package.json or retag."
            exit 1
          fi

      - name: Install dependencies
        working-directory: toolkit
        run: npm ci

      - name: Typecheck
        working-directory: toolkit
        run: npm run typecheck

      - name: Test
        working-directory: toolkit
        run: npm test

      - name: Build bundle
        working-directory: toolkit
        run: npm run build

      - name: Verify committed dist/okf.mjs is in sync with source
        working-directory: toolkit
        run: |
          if ! git diff --exit-code dist/okf.mjs; then
            echo "::error::dist/okf.mjs is out of sync. Run 'npm run build' in toolkit/ and commit the result before tagging."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            toolkit/dist/okf.mjs \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
